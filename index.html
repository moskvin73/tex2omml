<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub TeX Converter</title>
    <!-- Заглушка, чтобы браузер не ругался на отсутствие favicon.ico -->
    <link rel="icon" href="data:,">
    <!-- Путь к стилям в подкаталоге css -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="container">
        <h2>TeX → MathML & Word 2010 Конвертер</h2>
        <p class="subtitle">Работает на чистом JavaScript через GitHub Pages</p>
        
        <div class="mode-selector" style="margin-bottom: 15px; display: flex; gap: 20px; font-weight: 600;">
            <label style="cursor: pointer;">
                <input type="radio" name="mathMode" value="block" checked style="cursor: pointer;"> Блочный (Отдельная строка)
            </label>
            <label style="cursor: pointer;">
                <input type="radio" name="mathMode" value="inline" style="cursor: pointer;"> Встроенный (Внутри текста)
            </label>
        </div>        
        <textarea id="texInput" placeholder="Введите TeX формулу...">\frac{a}{b}</textarea>
        
        <div class="actions">
            <button id="btnConvert" class="btn-primary">Конвертировать</button>
            <!-- Новая кнопка для мгновенной вставки через Ctrl+V -->
            <button id="btnCopyWord" class="btn-copy" style="background-color: #217346; color: white;">Скопировать для Word (Ctrl+V)</button>
            <button id="btnDownload" class="btn-word">Скачать XML (.xml)</button>
        </div>

        <section class="result-box">
            <h3>Превью в браузере:</h3>
            <div id="mathMLPreview" class="preview-area"></div>
        </section>

        <div class="code-grid">
            <section class="result-box">
                <h3>Код MathML (Браузер)</h3>
                <pre><code id="mathMLCode"></code></pre>
            </section>
            <section class="result-box">
                <h3>Код OMML (Word 2010)</h3>
                <pre><code id="ommlCode"></code></pre>
            </section>
        </div>
    </main> 

    <!-- Правильный путь к app.js в подкаталоге js -->
    <script type="module" src="./js/app.js?v=11"></script>
</body>
</html>
